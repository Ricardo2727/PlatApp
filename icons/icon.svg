<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f1520"/>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Coin circle -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="#00e5ff" stroke-width="18"/>
  <circle cx="256" cy="240" r="100" fill="rgba(0,229,255,0.08)"/>
  <!-- Dollar sign -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="140" font-weight="900"
        fill="#00e5ff" text-anchor="middle">$</text>
  <!-- App name -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="52" font-weight="700"
        fill="#dde6f0" text-anchor="middle" letter-spacing="-1">PlatApp</text>
</svg>
